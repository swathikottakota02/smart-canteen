<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Admin Dashboard | Smart Canteen</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#fff7f0;
}

/* Header */

.header{
    background:white;
    padding:20px;
    text-align:center;
    border-bottom:3px solid #ff7a18;
}

.header h1{
    margin:0;
    color:#ff7a18;
}

/* Dashboard container */

.container{
    display:flex;
    justify-content:center;
    gap:30px;
    margin-top:60px;
    flex-wrap:wrap;
}

/* Card */

.card{
    background:white;
    width:220px;
    padding:25px;
    text-align:center;
    border-radius:12px;
    box-shadow:0 6px 15px rgba(0,0,0,0.15);
}

.card h3{
    margin-bottom:15px;
    color:#333;
}

.card a{
    display:inline-block;
    padding:10px 18px;
    background:#ff7a18;
    color:white;
    text-decoration:none;
    border-radius:6px;
    font-weight:bold;
}

.card a:hover{
    background:#e56700;
}

/* Canteen control buttons */

.canteen-controls{
    display:flex;
    justify-content:center;
    gap:25px;
    margin-top:40px;
}

.open-btn{
    background:#28a745;
    color:white;
    border:none;
    padding:12px 25px;
    font-size:16px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.open-btn:hover{
    background:#1e7e34;
}

.close-btn{
    background:#dc3545;
    color:white;
    border:none;
    padding:12px 25px;
    font-size:16px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.close-btn:hover{
    background:#b21f2d;
}

/* Logout */

.logout{
    margin-top:50px;
    text-align:center;
}

.logout a{
    color:#1e3a8a;
    font-weight:bold;
    text-decoration:none;
}

</style>
</head>

<body>

<!-- Header -->

<div class="header">
<h1>Admin Dashboard</h1>
</div>


<!-- Cards -->

<div class="container">

<div class="card">
<h3>Add Menu</h3>
<a th:href="@{/admin/menu/add}">Add Item</a>
</div>

<div class="card">
<h3>View Menu</h3>
<a th:href="@{/admin/menu/list}">View Items</a>
</div>

<div class="card">
<h3>View Orders</h3>
<a th:href="@{/admin/orders}">Orders</a>
</div>

</div>


<!-- Canteen Controls -->

<div class="canteen-controls">

<form action="/admin/canteen/open" method="post">
<button class="open-btn">🟢 Open Canteen</button>
</form>

<form action="/admin/canteen/close" method="post">
<button class="close-btn">🔴 Close Canteen</button>
</form>

</div>


<!-- Logout -->

<div class="logout">
<a th:href="@{/}">← Logout</a>
</div>

</body>
</html>
