<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Student Dashboard | Smart Canteen</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #fff7f0;
        }

        .header {
            background: white;
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid #ff7a18;
        }

        .header h1 {
            margin: 0;
            color: #ff7a18;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 60px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            width: 220px;
            padding: 25px;
            text-align: center;
            border-radius: 12px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
        }

        .card h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .card a {
            display: inline-block;
            padding: 10px 18px;
            background: #ff7a18;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
        }

        .card a:hover {
            background: #e56700;
        }

        .logout {
            margin-top: 50px;
            text-align: center;
        }

        .logout a {
            color: #1e3a8a;
            font-weight: bold;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="header">
    <h1>Student Dashboard</h1>
</div>

<div class="container">

    <div class="card">
        <h3>Order Food</h3>
        <a th:href="@{/menu}">View Menu</a>
    </div>

    <div class="card">
        <h3>My Orders</h3>
        <a th:href="@{/student/orders}">My Orders</a>
    </div>

</div>

<div class="logout">
    <a th:href="@{/}">← Logout</a>
</div>

</body>
</html>
