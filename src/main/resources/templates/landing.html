<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sanskriti Smart Canteen</title>


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: "Poppins", sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;

/* Canteen background image */

background:url("https://images.unsplash.com/photo-1504674900247-0877df9cc836")
no-repeat center center/cover;

position:relative;
}

/* Dark overlay */

body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
}

/* Text container */

.hero{
position:relative;
z-index:1;
}

/* Mask typing effect */

.hero h1{
    font-size: 6vw;   /* responsive font */
    letter-spacing: 2px;
    overflow: hidden;
    border-right: 3px solid white;
    animation: typing 4s steps(30,end) forwards,
               blink 0.8s infinite;
}

/* typing animation */

@keyframes typing{
    from{width:0}
    to{width:100%}
}

/* cursor blink */

@keyframes blink{
50%{border-color:transparent}
}

body {
    overflow-x: hidden;
}
/* subtitle */

.hero p{
margin-top:20px;
font-size:18px;
opacity:0;
animation:fadeIn 2s ease forwards;
animation-delay:4s;
}

@keyframes fadeIn{
to{opacity:1}
}


.navbar{
position:absolute;
top:20px;
right:40px;
display:flex;
gap:25px;
font-weight:bold;
}

.nav-links a{
color:white;
text-decoration:none;
font-size:18px;
}

.nav-links a:hover{
color:#ff7a18;
}
</style>

<script>

/* Redirect to login page after animation */

setTimeout(function(){
window.location.href="/";
},7000);

</script>

</head>

<body>


<div class="hero">

<h1>Welcome to Sanskrithi Canteen</h1>

<p>Smart Food Ordering for Campus</p>

</div>

<div class="navbar">

    <div class="nav-links">
        <a href="/login">Sign In</a>
        <a href="/register">Register</a>
    </div>
</div>

</body>
</html>
