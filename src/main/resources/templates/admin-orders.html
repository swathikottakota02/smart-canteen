<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Orders | Smart Canteen</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #fff7f0;
        }

        /* Header */
        .header {
            background: white;
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid #ff7a18;
        }

        .header h1 {
            margin: 0;
            color: #ff7a18;
        }

        /* Orders container */
        .orders-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
        }

        /* Order card */
        .order-card {
            background: white;
            border-radius: 14px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .order-id {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }

        .user {
            color: #555;
            font-size: 14px;
        }

        /* Status badge */
        .status {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            color: white;
        }

        .PLACED {
            background: #2563eb;
        }

        .PREPARING {
            background: #f59e0b;
        }

        .READY {
            background: #16a34a;
        }

        .COMPLETED {
            background: #6b7280;
        }

        /* Update form */
        .update-form {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        select {
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        button {
            padding: 8px 18px;
            background: #ff7a18;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #e56700;
        }

        /* Back */
        .back {
            text-align: center;
            margin-top: 40px;
        }

        .back a {
            text-decoration: none;
            font-weight: bold;
            color: #1e3a8a;
        }
    </style>
</head>

<body>

<!-- Header -->
<div class="header">
    <h1>All Orders 📋</h1>
</div>

<div class="orders-container">

    <div class="order-card" th:each="order : ${orders}">

        <div class="order-header">
            <div class="order-id">
                Order ID: <span th:text="${order.id}"></span>
            </div>

            <div class="user">
                User: <span th:text="${order.userEmail}"></span>
            </div>
        </div>

        <div>
            Status:
            <span class="status"
                  th:text="${order.status}"
                  th:classappend="' ' + ${order.status}">
            </span>
        </div>

        <!-- Update status -->
        <form class="update-form"
              th:action="@{/admin/orders/update}"
              method="post">

            <input type="hidden" name="orderId"
                   th:value="${order.id}"/>

            <select name="status">
			    <option th:selected="${order.status == 'PLACED'}">PLACED</option>
			    <option th:selected="${order.status == 'PREPARING'}">PREPARING</option>
			    <option th:selected="${order.status == 'READY'}">READY</option>
			    <option th:selected="${order.status == 'COMPLETED'}">COMPLETED</option>
			</select>

            <button type="submit">Update</button>
        </form>

    </div>

</div>

<div class="back">
    <a th:href="@{/admin/dashboard}">← Back to Dashboard</a>
</div>

</body>
</html>
